<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoneyFlow v2 FINAL</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#f3f4f6; font-family:sans-serif; }
.card { background:#fff; padding:14px; border-radius:12px; margin-bottom:10px; }
</style>
</head>

<body class="p-3">

<div class="flex justify-between items-center mb-2">
  <h1 class="text-xl font-bold">💰 MoneyFlow v2</h1>
  <button onclick="openSettings()">⚙️</button>
</div>

<div class="grid grid-cols-3 gap-2 mb-2">
  <div class="card text-green-600" id="sumIncome">0</div>
  <div class="card text-red-600" id="sumExpense">0</div>
  <div class="card text-blue-600" id="sumBalance">0</div>
</div>

<div class="card">
  <input type="month" id="monthFilter" class="w-full p-2 border rounded">
</div>

<div class="card">
  <input id="amount" type="number" placeholder="จำนวนเงิน" class="w-full mb-2 p-2 border rounded">
  <input id="desc" placeholder="รายละเอียด" class="w-full mb-2 p-2 border rounded">
  <select id="category" class="w-full mb-2 p-2 border rounded"></select>

  <div class="flex gap-2">
    <button onclick="setType('income')" class="flex-1 bg-green-500 text-white p-2 rounded">รายรับ</button>
    <button onclick="setType('expense')" class="flex-1 bg-red-500 text-white p-2 rounded">รายจ่าย</button>
  </div>

  <button onclick="addItem()" class="w-full mt-2 bg-blue-600 text-white p-2 rounded">บันทึก</button>
</div>

<canvas id="chartCanvas" class="card"></canvas>
<div id="list"></div>

<script>
const API_URL = 'https://script.google.com/a/macros/phpt.org/s/AKfycbzUdWchmeZAt_aqSFts80LeaGRXovnhp_7Irgh-zdb203_ow09uKtD-ZM0MVa2QaMiKLg/exec';

const DEFAULT_INCOME = ['เงินเดือน-PHPT-AMS','เงินเดือน-PHPT-Foundation','Reimbursements','รับจ้าง','ของขวัญ','อื่นๆ'];
const DEFAULT_EXPENSE = ['อาหาร','ค่าน้ำมัน','ค่ารถไฟฟ้า','ปกส-AMS','ปกส-Foundation','สุขภาพ','บันเทิง','ช้อปปิ้ง-BigC','ช้อปปิ้ง-Shopee','โทรศัพท์','ไฟฟ้า/น้ำ','ประกัน','อื่นๆ'];

let INCOME_CATS = JSON.parse(localStorage.getItem('income')) || DEFAULT_INCOME;
let EXPENSE_CATS = JSON.parse(localStorage.getItem('expense')) || DEFAULT_EXPENSE;

const COLORS = { income:'#10b981', expense:'#ef4444' };

let type='income', data=[], chart;

window.onload=()=>{
  monthFilter.value=new Date().toISOString().slice(0,7);
  renderCategory();
  sync();
};

function setType(t){ type=t; renderCategory(); }

function renderCategory(){
  const cats = type==='income'?INCOME_CATS:EXPENSE_CATS;
  category.innerHTML=cats.map(c=>`<option>${c}</option>`).join('');
}

async function apiGet(){
  try{
    const r=await fetch(API_URL+'?action=getAll');
    return await r.json();
  }catch{
    alert('❌ API error');
    return {success:false};
  }
}

async function apiPost(b){
  try{
    const r=await fetch(API_URL,{method:'POST',body:JSON.stringify(b)});
    return await r.json();
  }catch{
    alert('❌ save error');
    return {success:false};
  }
}

async function addItem(){
  const amountVal=Number(amount.value);
  const descVal=desc.value || '-'; // ถ้าไม่กรอก ให้เป็น '-'
  if(!amountVal){
    alert('กรอกจำนวนเงิน');
    return;
  }

  const res = await apiPost({
  action:'addTransaction',
  data:{
      date:new Date().toISOString().split('T')[0],
      amount:amountVal,
      desc:descVal,
      category:category.value,
      type
    }
  });

  if(res.success){ data.unshift(res.data); renderAll(); }
}

async function sync(){
  const res=await apiGet();
  if(res.success){ data=res.transactions||[]; renderAll(); }
}

function renderAll(){
  const month=monthFilter.value;
  const filtered=data.filter(i=>i.date.startsWith(month));

  let inc=0,exp=0;
  filtered.forEach(i=> i.type==='income'?inc+=Number(i.amount):exp+=Number(i.amount));

  sumIncome.innerText=inc;
  sumExpense.innerText=exp;
  sumBalance.innerText=inc-exp;

  list.innerHTML=filtered.map(i=>`
    <div class="card flex justify-between">
      <div>${i.desc}</div>
      <div style="color:${i.type==='income'?COLORS.income:COLORS.expense}">
        ${i.type==='income'?'+':'-'}${i.amount}
      </div>
    </div>`).join('');

  renderChart(filtered);
}

function renderChart(arr){
  const map={};
  arr.forEach(i=>{
    if(i.type==='expense'){
      map[i.category]=(map[i.category]||0)+Number(i.amount);
    }
  });

  const labels=Object.keys(map);
  const values=Object.values(map);

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById('chartCanvas'),{
    type:'pie',
    data:{labels,datasets:[{data:values}]}
  });
}

monthFilter.onchange=renderAll;
setInterval(sync,60000);
</script>

</body>
</html>
