<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoneyFlow</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: sans-serif; background:#f3f4f6; }
.card { background:#fff; border-radius:12px; padding:16px; margin-bottom:12px; }
button { touch-action: manipulation; }
</style>
</head>

<body class="p-3">

<h1 class="text-xl font-bold mb-3">💰 MoneyFlow</h1>

<div class="card">
  <input id="amount" type="number" placeholder="จำนวนเงิน" class="w-full mb-2 p-2 border rounded">
  <input id="desc" type="text" placeholder="รายละเอียด" class="w-full mb-2 p-2 border rounded">

  <select id="category" class="w-full mb-2 p-2 border rounded"></select>

  <div class="flex gap-2">
    <button onclick="setType('income')" class="flex-1 bg-green-500 text-white p-2 rounded">รายรับ</button>
    <button onclick="setType('expense')" class="flex-1 bg-red-500 text-white p-2 rounded">รายจ่าย</button>
  </div>

  <button onclick="addItem()" class="w-full mt-3 bg-blue-600 text-white p-2 rounded">บันทึก</button>
</div>

<div id="list"></div>

<script>
const DEFAULT_API_URL = 'https://script.google.com/a/macros/phpt.org/s/AKfycbzUdWchmeZAt_aqSFts80LeaGRXovnhp_7Irgh-zdb203_ow09uKtD-ZM0MVa2QaMiKLg/exec';
let API_URL = DEFAULT_API_URL;

const INCOME_CATS  = ['เงินเดือน-PHPT-AMS','เงินเดือน-PHPT-Foundation','Reimbursements','รับจ้าง','ของขวัญ','อื่นๆ'];
const EXPENSE_CATS = ['อาหาร','ค่าน้ำมัน','ค่ารถไฟฟ้า','ปกส-AMS','ปกส-Foundation','สุขภาพ','บันเทิง','ช้อปปิ้ง-BigC','ช้อปปิ้ง-Shopee','โทรศัพท์','ไฟฟ้า/น้ำ','ประกัน','อื่นๆ'];

const CAT_ICONS = {
  'เงินเดือน-PHPT-AMS':'💼','เงินเดือน-PHPT-Foundation':'🏢','Reimbursements':'💸','รับจ้าง':'🔧','ของขวัญ':'🎁',
  'อาหาร':'🍜','ค่าน้ำมัน':'⛽','ค่ารถไฟฟ้า':'🚆','ปกส-AMS':'🏥','ปกส-Foundation':'🧾',
  'สุขภาพ':'💊','บันเทิง':'🎬','ช้อปปิ้ง-BigC':'🛒','ช้อปปิ้ง-Shopee':'📦','โทรศัพท์':'📱',
  'ไฟฟ้า/น้ำ':'⚡','ประกัน':'🛡️','อื่นๆ':'📁'
};

const COLORS = { income:'#10b981', expense:'#ef4444' };

let type = 'income';
let data = [];

window.onload = () => { renderCategory(); sync(); };

function setType(t){ type = t; renderCategory(); }

function renderCategory(){
  const select = document.getElementById('category');
  const cats = type === 'income' ? INCOME_CATS : EXPENSE_CATS;
  select.innerHTML = cats.map(c=>`<option>${c}</option>`).join('');
}

async function apiGet(){
  const res = await fetch(API_URL + '?action=getAll');
  return await res.json();
}

async function apiPost(body){
  const res = await fetch(API_URL,{method:'POST',body:JSON.stringify(body)});
  return await res.json();
}

async function addItem(){
  const amount = document.getElementById('amount').value;
  const desc = document.getElementById('desc').value;
  const category = document.getElementById('category').value;

  if(!amount || !desc) return alert('กรอกข้อมูลให้ครบ');

  const res = await apiPost({
    action:'addTransaction',
    data:{
      date:new Date().toISOString().split('T')[0],
      amount, desc, category, type
    }
  });

  if(res.success){ data.unshift(res.data); render(); }
}

function render(){
  const list = document.getElementById('list');
  list.innerHTML = data.map(i=>`
    <div class="card flex justify-between">
      <div>${CAT_ICONS[i.category]||''} ${i.desc}</div>
      <div style="color:${i.type==='income'?COLORS.income:COLORS.expense}">
        ${i.type==='income'?'+':'-'}${i.amount}
      </div>
    </div>
  `).join('');
}

async function sync(){
  const res = await apiGet();
  if(res.success){ data = res.transactions || []; render(); }
}
</script>

</body>
</html>
